<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CalmSpace</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="app.js" defer></script>
</head>
<body>

<header>
  <h1>CalmSpace 🌿</h1>
  <nav>
    <a href="#moodSection">Mood</a>
    <a href="#gratitudeSection">Gratitude</a>
    <a href="#historySection">History</a>
    <a href="#breathSection">Breathing</a>
  </nav>
  <button id="themeToggle">Dark Mode</button>
</header>

<main>

<!-- Mood -->
<section id="moodSection" class="section-bg mood-bg">
  <h2>How are you feeling today?</h2>
  <div class="card">
    <div class="moods">
      <img src="https://twemoji.maxcdn.com/v/latest/72x72/1f61e.png" onclick="selectMood('😔')">
      <img src="https://twemoji.maxcdn.com/v/latest/72x72/1f615.png" onclick="selectMood('😕')">
      <img src="https://twemoji.maxcdn.com/v/latest/72x72/1f610.png" onclick="selectMood('😐')">
      <img src="https://twemoji.maxcdn.com/v/latest/72x72/1f642.png" onclick="selectMood('🙂')">
      <img src="https://twemoji.maxcdn.com/v/latest/72x72/1f60a.png" onclick="selectMood('😊')">
    </div>
    <textarea id="note" placeholder="Write something..."></textarea>
    <button class="primary" onclick="saveEntry()">Save</button>
    <button class="secondary" onclick="showSupport()">I need support</button>
    <div id="supportBox" class="hidden"></div>
    <p id="dailyPrompt"></p>
  </div>
</section>

<!-- Gratitude -->
<section id="gratitudeSection" class="section-bg gratitude-bg">
  <h2>Gratitude Journal 🌸</h2>
  <div class="card">
    <img src="https://cdn-icons-png.flaticon.com/512/833/833472.png" width="60">
    <input type="text" id="gratitudeInput" placeholder="What are you grateful for?">
    <button class="primary" onclick="addGratitude()">Add</button>
    <ul id="gratitudeList"></ul>
  </div>
</section>

<!-- History -->
<section id="historySection" class="section-bg history-bg">
  <h2>Mood History</h2>
  <div class="card">
    <button class="primary" onclick="exportCSV()">Download CSV</button>
    <div id="tableCard">
      <table id="historyTable">
        <thead>
          <tr>
            <th>Date</th>
            <th>Mood</th>
            <th>Note</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
      <button id="seeMoreBtn" onclick="toggleTable()">See More</button>
    </div>
    <div id="chartCard">
      <canvas id="moodChart"></canvas>
    </div>
  </div>
</section>

<!-- Breathing -->
<section id="breathSection" class="section-bg relax-bg">
  <h2>Breathing Exercise 🌬️</h2>
  <div class="card">
    <img src="https://cdn-icons-png.flaticon.com/512/414/414927.png" width="60">
    <div id="breathCircle"></div>
    <p id="breathText">Follow the circle</p>
    <button class="primary" onclick="startBreathing()">Start</button>
  </div>
</section>

</main>

<footer>
  <p>CalmSpace</p>
</footer>

</body>
</html>
