<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CalmSpace</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<header>
  <h1>CalmSpace 🌿</h1>
  <nav>
    <a href="#mood">Mood Tracker</a> |
    <a href="#history">Mood History</a> |
    <a href="#gratitude">Gratitude</a> |
    <a href="#relax">Relax & Chat</a>
  </nav>
</header>

<main>

<section id="mood" class="section-bg mood-bg">
  <h2>🌿 How are you feeling today?</h2>
  <div class="moods">
    <img src="https://em-content.zobj.net/thumbs/240/twitter/322/pensive-face_1f614.png" onclick="selectMood('😔')" alt="😔">
    <img src="https://em-content.zobj.net/thumbs/240/twitter/322/confused-face_1f615.png" onclick="selectMood('😕')" alt="😕">
    <img src="https://em-content.zobj.net/thumbs/240/twitter/322/neutral-face_1f610.png" onclick="selectMood('😐')" alt="😐">
    <img src="https://em-content.zobj.net/thumbs/240/twitter/322/slightly-smiling-face_1f642.png" onclick="selectMood('🙂')" alt="🙂">
    <img src="https://em-content.zobj.net/thumbs/240/twitter/322/smiling-face-with-smiling-eyes_1f60a.png" onclick="selectMood('😊')" alt="😊">
  </div>
  <textarea id="note" placeholder="Write something (optional)"></textarea>
  <button class="primary" onclick="saveEntry()">Save Mood</button>
  <button class="secondary" onclick="showSupport()">I need support</button>
  <div id="supportBox" class="hidden"></div>
</section>

<section id="history" class="section-bg history-bg">
  <h2>🌈 Mood History</h2>
  <table id="historyTable">
    <thead>
      <tr><th>Date</th><th>Mood</th><th>Note</th></tr>
    </thead>
    <tbody>
      <tr><td colspan="3">No entries yet.</td></tr>
    </tbody>
  </table>
</section>

<section id="gratitude" class="section-bg gratitude-bg">
  <h2>🙏 Gratitude Journal</h2>
  <textarea id="gratitude" placeholder="Write 1–3 things you are grateful for today…"></textarea>
  <button class="secondary" onclick="saveGratitude()">Save Gratitude</button>
  <div id="gratitudeBox" class="hidden">Saved! 🌿</div>
  <ul id="gratitudeList"></ul>
</section>

<section id="relax" class="section-bg relax-bg">
  <h2>💨 Relax & Chat</h2>
  <div id="breathingBox">
    <p>Breathing Exercise:</p>
    <div id="breathCircle"></div>
    <button class="secondary" onclick="startBreathing()">Start Breathing</button>
  </div>

  <div id="chatBox">
    <p>Chat with AI:</p>
    <div id="chatMessages"></div>
    <input type="text" id="chatInput" placeholder="Say something...">
    <button class="primary" onclick="sendChat()">Send</button>
    <button class="secondary" onclick="openChat()">Open Chat</button>
  </div>
</section>

<section id="chart" class="section-bg chart-bg">
  <h2>📊 Mood Trend</h2>
  <canvas id="moodChart" width="600" height="300"></canvas>
</section>

</main>

<footer>
  <p>CalmSpace © 2026 | <a href="#">Contact</a> | <a href="#">Support</a></p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="app.js"></script>
</body>
</html>
