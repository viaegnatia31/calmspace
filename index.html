<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CalmSpace</title>
  <link rel="stylesheet" href="./style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
  <script src="./app.js" defer></script>
</head>
<body>

<div class="container">

  <!-- Mood Section -->
  <div class="card section-bg mood-bg">
    <h2>How are you feeling today? 🌿</h2>
    <div class="moods">
      <span onclick="selectMood('😔')">😔</span>
      <span onclick="selectMood('😕')">😕</span>
      <span onclick="selectMood('😐')">😐</span>
      <span onclick="selectMood('🙂')">🙂</span>
      <span onclick="selectMood('😊')">😊</span>
    </div>
    <textarea id="moodNote" placeholder="Write something (optional)"></textarea>
    <p class="daily-prompt" id="dailyPrompt"></p>
    <button class="primary" onclick="saveMood()">Save Mood</button>
  </div>

  <!-- Gratitude Section -->
  <div class="card section-bg gratitude-bg">
    <h2>Gratitude Journal ✨</h2>
    <textarea id="gratitudeNote" placeholder="Write something you're grateful for"></textarea>
    <button class="primary" onclick="saveGratitude()">Save Gratitude</button>
    <div id="gratitudeEntries"></div>
  </div>

  <!-- Mood History Section -->
  <div class="card section-bg history-bg">
    <h2>Mood History 📊</h2>
    <div class="history-container">
      <div class="history-card">
        <h3>Table</h3>
        <table id="moodTable">
          <thead>
            <tr>
              <th>Date</th>
              <th>Mood</th>
              <th>Note</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
        <button class="secondary" onclick="toggleTable()">See More</button>
      </div>
      <div class="history-card">
        <h3>Chart</h3>
        <canvas id="moodChart"></canvas>
      </div>
    </div>
  </div>

  <!-- Breathing Section -->
  <div class="card section-bg relax-bg">
    <h2>Breathing Exercise 🌬️</h2>
    <div class="breathing-container">
      <div class="circle"></div>
      <p id="breathText">Inhale...</p>
    </div>
    <button class="primary" onclick="startBreathing()">Start Breathing</button>
  </div>

  <!-- Support Section -->
  <div class="card section-bg support-bg">
    <h2>Need Support?</h2>
    <button class="secondary" onclick="showSupport()">I need support</button>
    <div id="supportBox" class="hidden">
      <p id="supportText"></p>
    </div>
  </div>

  <!-- Dark Mode Toggle -->
  <button id="darkModeToggle" class="secondary" onclick="toggleDarkMode()">Toggle Dark Mode</button>

</div>

</body>
</html>
